name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Capacitor Android
        run: npx cap add android
      - name: Copy icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          find . -name "*.png" | head -10
          cp resources/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || cp *.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || echo "Icon skip"
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || echo "skip"
      - name: Sync
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neo-alarm-clock
          path: android/app/src/main/res/mipmap-xxxhdpi/android/app/build/outputs/apk/debug/app-debug.apk
