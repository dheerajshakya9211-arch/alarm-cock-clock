name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Capacitor Android
        run: npx cap add android
      - name: Copy icon
        run: |
          for dir in android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
            mkdir -p "$dir"
            cp file_000000007f4071f8bb91a33f1a32e5b2.png "${dir}/ic_launcher.png"
            cp file_000000007f4071f8bb91a33f1a32e5b2.png "${dir}/ic_launcher_round.png"
            cp file_000000007f4071f8bb91a33f1a32e5b2.png "${dir}/ic_launcher_foreground.png"
          done
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          
      - name: Sync
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: cd android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neo-alarm-clock
          path: android/app/build/outputs/apk/debug/app-debug.apk
