<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Neo Alarm Clock (Fixed)</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ═══ CSS STYLES ═══ */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060a0f;--panel:#0d1520;--border:#1a3a5c;--glow:#00d4ff;--glow2:#ff6b35;--red:#ff3b3b;--green:#00ff9d;--text:#cde8ff;--dim:#3a6080}
body{background:var(--bg);min-height:100dvh;display:flex;flex-direction:column;align-items:center;font-family:'Share Tech Mono',monospace;color:var(--text);overflow-x:hidden;padding:10px;user-select:none;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.container{display:flex;flex-direction:column;align-items:center;gap:12px;z-index:10;width:100%;max-width:520px}
.brand{display:flex;flex-direction:column;align-items:center;gap:6px}
.brand-row{display:flex;align-items:center;gap:12px}
.brand h1{font-family:'Orbitron',sans-serif;font-size:clamp(1rem,5vw,1.6rem);font-weight:900;color:var(--glow);text-shadow:0 0 20px var(--glow);animation:tp 3s ease-in-out infinite}
@keyframes tp{0%,100%{text-shadow:0 0 20px var(--glow)}50%{text-shadow:0 0 40px var(--glow)}}
.logo-clock{width:48px;height:48px;filter:drop-shadow(0 0 10px rgba(0,212,255,.7));flex-shrink:0}
.nav-tabs{display:flex;gap:4px;width:100%;flex-wrap:wrap}
.nav-tab{flex:1;min-width:52px;font-family:'Orbitron',sans-serif;font-size:.52rem;letter-spacing:.08em;padding:10px 2px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .2s;line-height:1.3}
.nav-tab.active{background:rgba(0,212,255,.15);border-color:var(--glow);color:var(--glow);box-shadow:0 0 8px rgba(0,212,255,.2)}
.page{display:none;width:100%;flex-direction:column;gap:12px}.page.active{display:flex}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:16px;width:100%;position:relative;box-shadow:0 0 10px rgba(0,0,0,.4)}
.panel::before{content:'';position:absolute;top:6px;left:6px;width:10px;height:10px;border:1.5px solid var(--glow);border-right:none;border-bottom:none}
.panel::after{content:'';position:absolute;bottom:6px;right:6px;width:10px;height:10px;border:1.5px solid var(--glow);border-left:none;border-top:none}
.sl{font-size:.55rem;letter-spacing:.4em;color:var(--dim);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}
#clock{font-family:'Orbitron',sans-serif;font-size:clamp(3rem,14vw,5.5rem);font-weight:700;color:var(--glow);text-shadow:0 0 30px var(--glow);letter-spacing:.05em;line-height:1;text-align:center;margin-bottom:8px}
#clock.alarm-on{animation:af .5s ease-in-out infinite}
@keyframes af{0%,100%{color:var(--glow)}50%{color:var(--red);text-shadow:0 0 40px var(--red)}}
.date-container{text-align:center;margin-top:4px}
#dayName{font-size:.8rem;color:var(--glow2);letter-spacing:.3em;text-transform:uppercase;margin-bottom:2px}
#dateNum{font-family:'Orbitron',sans-serif;font-size:1.4rem;color:var(--text);letter-spacing:.1em}
#monthYear{font-size:.7rem;color:var(--dim);letter-spacing:.3em;margin-top:2px}
.world-clocks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.world-item{background:#070f1a;border:1px solid var(--border);border-radius:3px;padding:8px 10px;cursor:pointer;transition:all .2s}
.world-item:hover{border-color:var(--glow);background:rgba(0,212,255,.05)}
.world-item.is-home{border-color:var(--glow2);box-shadow:0 0 8px rgba(255,107,53,.2)}
.world-city{font-size:.6rem;color:var(--dim);letter-spacing:.2em;margin-bottom:2px}
.world-time{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--glow)}
.world-date{font-size:.55rem;color:var(--dim)}
.world-item .set-tz{font-size:.5rem;color:var(--dim);margin-top:3px;display:block;letter-spacing:.1em}
.world-item.is-home .set-tz{color:var(--glow2)}
input[type=time],input[type=text],input[type=number],select{background:#070f1a;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.85rem;padding:9px 10px;border-radius:3px;outline:none;width:100%;transition:border-color .2s}
input[type=time]{color:var(--glow);font-family:'Orbitron',sans-serif;font-size:1rem}
input:focus,select:focus{border-color:var(--glow)}
select option{background:#0d1520}
.row{display:flex;gap:8px}.row>*{flex:1}
.sound-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.sound-btn{background:#070f1a;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:8px 4px;border-radius:3px;cursor:pointer;text-align:center;transition:all .2s}
.sound-btn.selected{background:rgba(0,212,255,.12);border-color:var(--glow);color:var(--glow)}
.range-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.range-row label{font-size:.6rem;color:var(--dim);width:80px;flex-shrink:0}
input[type=range]{flex:1;accent-color:var(--glow);cursor:pointer}
.range-val{font-size:.7rem;color:var(--glow);width:36px;text-align:right}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-row label{font-size:.68rem;color:var(--text)}
.toggle-row span{font-size:.58rem;color:var(--dim);display:block}
.toggle{position:relative;width:40px;height:20px;flex-shrink:0}
.toggle input{display:none}
.toggle-track{position:absolute;inset:0;background:#0a1825;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .3s}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--dim);border-radius:50%;transition:all .3s}
.toggle input:checked+.toggle-track{background:rgba(0,212,255,.15);border-color:var(--glow)}
.toggle input:checked+.toggle-track::after{transform:translateX(20px);background:var(--glow);box-shadow:0 0 8px var(--glow)}
.btn{font-family:'Orbitron',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.12em;padding:12px 14px;border:none;border-radius:3px;cursor:pointer;text-transform:uppercase;white-space:nowrap;transition:all .2s}
.btn-primary{background:var(--glow);color:#000;box-shadow:0 0 16px rgba(0,212,255,.3)}
.btn-secondary{background:transparent;border:1px solid var(--glow);color:var(--glow)}
.btn-danger{background:var(--red);color:#fff;animation:bp .5s ease-in-out infinite}
@keyframes bp{0%,100%{box-shadow:0 0 16px rgba(255,59,59,.4)}50%{box-shadow:0 0 32px rgba(255,59,59,.8)}}
.btn-snooze{background:rgba(255,107,53,.2);color:var(--glow2);border:1px solid var(--glow2);font-family:'Orbitron',sans-serif;font-size:.6rem;padding:9px 12px;border-radius:3px;cursor:pointer;white-space:nowrap}
.alarm-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;margin-top:10px}
.alarm-item{background:#070f1a;border:1px solid var(--border);border-radius:3px;padding:10px 12px}
.alarm-item.ringing{border-color:var(--red);animation:ifl .5s ease-in-out infinite}
@keyframes ifl{0%,100%{background:rgba(255,59,59,.06)}50%{background:rgba(255,59,59,.18)}}
.alarm-top{display:flex;align-items:center;justify-content:space-between}
.alarm-time-txt{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--glow)}
.alarm-item.ringing .alarm-time-txt{color:var(--red)}
.alarm-actions{display:flex;align-items:center;gap:8px}
.alarm-bottom{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:.55rem;padding:2px 7px;border-radius:2px;border:1px solid}
.badge-label{color:var(--dim);border-color:var(--border)}
.badge-sound{color:var(--glow2);border-color:rgba(255,107,53,.3)}
.badge-info{color:var(--green);border-color:rgba(0,255,157,.3)}
.btn-del{background:transparent;border:1px solid #2a1a1a;color:#553333;font-size:.8rem;width:26px;height:26px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.no-alarms{text-align:center;color:var(--dim);font-size:.65rem;padding:20px}
.ring-overlay{display:none;position:fixed;inset:0;z-index:200;pointer-events:none}
.ring-overlay.show{display:block;animation:ro .5s ease-in-out infinite}
@keyframes ro{0%,100%{background:rgba(255,59,59,.03)}50%{background:rgba(255,59,59,.12)}}
.ringing-banner{display:none;background:rgba(255,59,59,.12);border:1px solid var(--red);border-radius:4px;padding:14px;text-align:center;width:100%}
.ringing-banner.show{display:block}
.ringing-title{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--red);margin-bottom:4px;animation:af .5s ease-in-out infinite}
.ringing-label{font-size:.75rem;color:var(--text);margin-bottom:12px;font-weight:bold}
.snooze-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.stopwatch-display,.timer-display{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,10vw,3.5rem);font-weight:700;color:var(--glow);text-align:center;text-shadow:0 0 20px var(--glow);letter-spacing:.05em}
.lap-list{max-height:160px;overflow-y:auto;margin-top:10px;display:flex;flex-direction:column;gap:4px}
.lap-item{display:flex;justify-content:space-between;font-size:.65rem;padding:5px 8px;background:#070f1a;border:1px solid var(--border);border-radius:3px}
.lap-num{color:var(--dim)}.lap-time{color:var(--glow);font-family:'Orbitron',sans-serif}.lap-split{color:var(--glow2)}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.theme-card{border:2px solid transparent;border-radius:6px;padding:10px;cursor:pointer;text-align:center;transition:all .2s}
.theme-card.active{border-color:var(--glow);box-shadow:0 0 12px rgba(0,212,255,.3)}
.theme-dot{width:24px;height:24px;border-radius:50%;margin:0 auto 6px}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.lang-card{background:#070f1a;border:1px solid var(--border);border-radius:3px;padding:8px;cursor:pointer;text-align:center;transition:all .2s;font-size:.62rem;color:var(--dim);-webkit-tap-highlight-color:rgba(0,212,255,.2)}
.lang-card:hover{border-color:var(--glow);color:var(--glow)}
.lang-card.active{background:rgba(0,212,255,.15);border-color:var(--glow);color:var(--glow);box-shadow:0 0 6px rgba(0,212,255,.2)}
.lang-card .ck{display:none;color:var(--green);font-size:.7rem;margin-top:2px}
.lang-card.active .ck{display:block}
.status-bar{display:flex;justify-content:space-between;width:100%;font-size:.55rem;color:var(--dim);letter-spacing:.15em;padding:0 2px}
.status-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:bk 2s ease-in-out infinite;margin-right:5px}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.settings-row{padding:10px 0;border-bottom:1px solid var(--border)}.settings-row:last-child{border-bottom:none}
.settings-row>label{font-size:.65rem;color:var(--text);display:block;margin-bottom:6px}
.upload-btn{background:#070f1a;border:2px dashed var(--border);color:var(--dim);width:100%;padding:12px;border-radius:3px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:.7rem;text-align:center;transition:all .2s}
.upload-btn:hover{border-color:var(--glow);color:var(--glow)}
.custom-sound-name{font-size:.65rem;color:var(--green);margin-top:6px;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--glow);border-radius:8px;padding:24px;max-width:300px;width:90%;text-align:center}
.modal-box h3{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--glow);margin-bottom:16px}
.modal-box input{margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.sound-status{font-size:.55rem;color:var(--green);margin-top:2px;min-height:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--glow);color:var(--glow);font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:10px 20px;border-radius:4px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="ring-overlay" id="ringOverlay"></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="snoozeModal">
  <div class="modal-box">
    <h3 id="modalTitle">CUSTOM SNOOZE</h3>
    <input type="number" id="snoozeCustomMin" placeholder="Minutes (1-60)" min="1" max="60" style="text-align:center">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="snoozeFromModal()">OK</button>
      <button class="btn btn-secondary" onclick="document.getElementById('snoozeModal').classList.remove('show')" id="modalCancel">CANCEL</button>
    </div>
  </div>
</div>
<div class="container">
  <div class="brand">
    <div class="brand-row">
      <svg class="logo-clock" viewBox="0 0 54 54" fill="none">
        <circle cx="27" cy="27" r="25" stroke="var(--glow)" stroke-width="2" fill="var(--bg)"/>
        <circle cx="27" cy="27" r="21" stroke="var(--border)" stroke-width=".8"/>
        <line x1="27" y1="4" x2="27" y2="8" stroke="var(--glow)" stroke-width="2" transform="rotate(0 27 27)"/>
        <line x1="27" y1="4" x2="27" y2="8" stroke="var(--glow)" stroke-width="2" transform="rotate(90 27 27)"/>
        <line x1="27" y1="4" x2="27" y2="8" stroke="var(--glow)" stroke-width="2" transform="rotate(180 27 27)"/>
        <line x1="27" y1="4" x2="27" y2="8" stroke="var(--glow)" stroke-width="2" transform="rotate(270 27 27)"/>
        <line id="lh" x1="27" y1="27" x2="27" y2="15" stroke="var(--glow)" stroke-width="2.5" stroke-linecap="round"/>
        <line id="lm" x1="27" y1="27" x2="27" y2="11" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round"/>
        <line id="ls" x1="27" y1="30" x2="27" y2="10" stroke="var(--red)" stroke-width="1" stroke-linecap="round"/>
        <circle cx="27" cy="27" r="2.5" fill="var(--glow)"/>
        <circle cx="15" cy="8" r="2" fill="var(--glow)" opacity=".6"/>
        <circle cx="39" cy="8" r="2" fill="var(--glow)" opacity=".6"/>
      </svg>
      <h1>NEO ALARM</h1>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('clock',this)">🕐<br><span data-t="navClock">CLOCK</span></button>
    <button class="nav-tab" onclick="showPage('alarm',this)">⏰<br><span data-t="navAlarm">ALARM</span></button>
    <button class="nav-tab" onclick="showPage('timer',this)">⏱<br><span data-t="navTimer">TIMER</span></button>
    <button class="nav-tab" onclick="showPage('stopwatch',this)">⏲<br><span data-t="navWatch">WATCH</span></button>
    <button class="nav-tab" onclick="showPage('world',this)">🌍<br><span data-t="navWorld">WORLD</span></button>
    <button class="nav-tab" onclick="showPage('settings',this)">⚙️<br><span data-t="navSet">SET</span></button>
  </div>

  <div class="page active" id="page-clock">
    <div class="panel" style="text-align:center">
      <div id="clock">--:--:--</div>
      <div class="date-container"><div id="dayName">---</div><div id="dateNum">--</div><div id="monthYear">--- · ----</div></div>
    </div>
    <div class="ringing-banner" id="ringingBanner">
      <div class="ringing-title" id="ringTitle">⏰ ALARM RINGING!</div>
      <div class="ringing-label" id="ringingLabel">ALARM</div>
      <div class="snooze-btns">
        <button class="btn-snooze" onclick="doSnooze(5)" data-t="snooze5">😴 5 MIN</button>
        <button class="btn-snooze" onclick="doSnooze(10)" data-t="snooze10">😴 10 MIN</button>
        <button class="btn-snooze" onclick="document.getElementById('snoozeModal').classList.add('show')" data-t="snoozeCustom">⏱ CUSTOM</button>
        <button class="btn btn-danger" onclick="stopAlarm()" data-t="stop">■ STOP</button>
      </div>
      <div id="snoozeCountInfo" style="font-size:.6rem;color:var(--dim);margin-top:6px"></div>
    </div>
  </div>

  <div class="page" id="page-alarm">
    <div class="panel">
      <div class="sl" data-t="setAlarm">SET NEW ALARM</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div class="row">
          <input type="time" id="alarmTime">
          <input type="text" id="alarmLabel" data-tp="labelPh" placeholder="Label">
        </div>
        <div class="sl" data-t="chooseSound">CHOOSE SOUND</div>
        <div class="sound-grid" id="soundGrid">
          <button class="sound-btn selected" onclick="selSound('rooster',this)">🐓 Rooster</button>
          <button class="sound-btn" onclick="selSound('bell',this)">🔔 Bell</button>
          <button class="sound-btn" onclick="selSound('beep',this)">📡 Beep</button>
          <button class="sound-btn" onclick="selSound('chime',this)">🎵 Chime</button>
          <button class="sound-btn" onclick="selSound('buzz',this)">⚡ Buzz</button>
          <button class="sound-btn" onclick="selSound('digital',this)">💻 Digital</button>
          <button class="sound-btn" onclick="selSound('rain',this)">🌧 Rain</button>
          <button class="sound-btn" onclick="selSound('birds',this)">🐦 Birds</button>
          <button class="sound-btn" onclick="selSound('ocean',this)">🌊 Ocean</button>
          <button class="sound-btn" onclick="selSound('custom',this)" style="grid-column:span 3" id="customSoundBtn" data-t="customSound">🎵 Custom Sound</button>
        </div>
        <div id="soundStatus" class="sound-status"></div>
        <div class="upload-btn" onclick="document.getElementById('customSoundFile').click()">
          <span data-t="uploadBtn">📁 Upload MP3 / WAV</span>
          <input type="file" id="customSoundFile" accept="audio/*" style="display:none" onchange="handleUpload(this)">
        </div>
        <div class="custom-sound-name" id="customSoundName"></div>
        <div class="range-row">
          <label data-t="volume">🔊 VOLUME</label>
          <input type="range" id="alarmVol" min="0" max="100" value="80" oninput="document.getElementById('volVal').textContent=this.value+'%'">
          <span class="range-val" id="volVal">80%</span>
        </div>
        <div class="toggle-row">
          <div><label data-t="gradual">📈 GRADUAL VOLUME</label><span data-t="gradualDesc">Slowly gets louder</span></div>
          <label class="toggle"><input type="checkbox" id="gradualVol" checked><div class="toggle-track"></div></label>
        </div>
        <div class="toggle-row">
          <div><label data-t="vibration">📳 VIBRATION</label><span data-t="vibrationDesc">Vibrate on alarm</span></div>
          <label class="toggle"><input type="checkbox" id="vibration" checked><div class="toggle-track"></div></label>
        </div>
        <div class="sl" data-t="snooze">SNOOZE</div>
        <div class="row">
          <select id="snoozeTime"><option value="5">5 min</option><option value="10" selected>10 min</option><option value="15">15 min</option></select>
          <select id="snoozeLimit"><option value="1">1x</option><option value="2">2x</option><option value="3" selected>3x</option><option value="5">5x</option><option value="99">Unlimited</option></select>
        </div>
        <button class="btn btn-primary" onclick="addAlarm()" style="width:100%" data-t="setBtn">+ SET ALARM</button>
      </div>
    </div>
    <div class="panel">
      <div class="sl" data-t="myAlarms">MY ALARMS</div>
      <div class="alarm-list" id="alarmList"><div class="no-alarms" data-t="noAlarms">[ NO ALARMS SET ]</div></div>
    </div>
  </div>

  <div class="page" id="page-timer">
    <div class="panel">
      <div class="sl" data-t="timerLabel">COUNTDOWN
