<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- 🔥 App Name Fixed -->
<title>Neo Alarm Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="capacitor.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

/* 🔥 Improved Theme Variables */
:root{
  --bg:#05080d;
  --panel:#0c1420;
  --border:#1a3a5c;
  --glow:#00e5ff;
  --glow2:#ff7a3d;
  --red:#ff3b3b;
  --green:#00ff9d;
  --text:#d6ecff;
  --dim:#4a6f90;
}

/* BODY */
body{
  background:var(--bg);
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Share Tech Mono',monospace;
  color:var(--text);
  overflow-x:hidden;
  padding:12px;
}

/* GRID BACKGROUND */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* CONTAINER */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  z-index:10;
  width:100%;
  max-width:520px;
}

/* BRAND */
.brand{
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.brand-row{
  display:flex;
  align-items:center;
  gap:12px;
}

/* 🔥 Title Glow Improved */
.brand h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1rem,5vw,1.6rem);
  font-weight:900;
  color:var(--glow);
  text-shadow:0 0 25px var(--glow);
  animation:titlePulse 2.5s ease-in-out infinite;
}

@keyframes titlePulse{
  0%,100%{text-shadow:0 0 20px var(--glow)}
  50%{text-shadow:0 0 45px var(--glow)}
}

/* LOGO */
.logo-clock{
  width:48px;
  height:48px;
  filter:drop-shadow(0 0 12px rgba(0,229,255,0.9));
  flex-shrink:0;
}

#logo-hour-hand,#logo-minute-hand,#logo-second-hand{
  transform-origin:27px 27px;
}

/* NAVIGATION */
.nav-tabs{
  display:flex;
  gap:4px;
  width:100%;
  flex-wrap:wrap;
}

.nav-tab{
  flex:1;
  min-width:60px;
  font-family:'Orbitron',sans-serif;
  font-size:0.5rem;
  letter-spacing:0.1em;
  padding:7px 2px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--dim);
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  transition:all 0.2s;
}

.nav-tab.active{
  background:rgba(0,229,255,0.15);
  border-color:var(--glow);
  color:var(--glow);
  box-shadow:0 0 8px rgba(0,229,255,0.3);
}

/* PAGES */
.page{display:none;width:100%;flex-direction:column;gap:12px}
.page.active{display:flex}

/* PANELS */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:6px;
  padding:16px;
  width:100%;
  position:relative;
  box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.panel::before{
  content:'';
  position:absolute;
  top:6px;
  left:6px;
  width:10px;
  height:10px;
  border:1.5px solid var(--glow);
  border-right:none;
  border-bottom:none;
}

.panel::after{
  content:'';
  position:absolute;
  bottom:6px;
  right:6px;
  width:10px;
  height:10px;
  border:1.5px solid var(--glow);
  border-left:none;
  border-top:none;
}

/* SECTION LABEL */
.sec-label{
  font-size:0.55rem;
  letter-spacing:0.4em;
  color:var(--dim);
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}

.sec-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* CLOCK */
#clock{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2.5rem,12vw,5rem);
  font-weight:700;
  color:var(--glow);
  text-shadow:0 0 35px var(--glow);
  letter-spacing:0.05em;
  line-height:1;
  text-align:center;
}

/* 🔥 Stronger Alarm Flash */
#clock.alarm-on{
  animation:alarmFlash 0.4s ease-in-out infinite;
}

@keyframes alarmFlash{
  0%,100%{color:var(--glow)}
  50%{color:var(--red);text-shadow:0 0 50px var(--red)}
}

/* DATE */
#date{
  margin-top:6px;
  font-size:0.65rem;
  color:var(--dim);
  letter-spacing:0.2em;
  text-align:center;
}
</style>
</head>
<body>

<div class="ring-overlay" id="ringOverlay"></div>
<audio id="alarmAudio" loop></audio>

<div class="container">

<!-- 🔥 BRAND -->
<div class="brand">
  <div class="brand-row">
    <svg class="logo-clock" viewBox="0 0 54 54" fill="none">
      <circle cx="27" cy="27" r="25" stroke="#00e5ff" stroke-width="2" fill="#05080d"/>
      <circle cx="27" cy="27" r="21" stroke="#1a3a5c" stroke-width="0.8" fill="none"/>

      <!-- hour marks -->
      <line x1="27" y1="4" x2="27" y2="8" stroke="#00e5ff" stroke-width="2"/>
      <line x1="27" y1="4" x2="27" y2="8" stroke="#00e5ff" stroke-width="2" transform="rotate(90 27 27)"/>
      <line x1="27" y1="4" x2="27" y2="8" stroke="#00e5ff" stroke-width="2" transform="rotate(180 27 27)"/>
      <line x1="27" y1="4" x2="27" y2="8" stroke="#00e5ff" stroke-width="2" transform="rotate(270 27 27)"/>

      <!-- hands -->
      <line id="logo-hour-hand" x1="27" y1="27" x2="27" y2="14" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round"/>
      <line id="logo-minute-hand" x1="27" y1="27" x2="27" y2="10" stroke="#cde8ff" stroke-width="1.5" stroke-linecap="round"/>
      <line id="logo-second-hand" x1="27" y1="30" x2="27" y2="9" stroke="#ff3b3b" stroke-width="1" stroke-linecap="round"/>

      <circle cx="27" cy="27" r="2.5" fill="#00e5ff"/>
    </svg>

    <!-- 🔥 NAME FIX -->
    <h1>NEO ALARM CLOCK</h1>
  </div>
</div>

<!-- 🔥 NAVIGATION -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('clock',this)">🕐 CLOCK</button>
  <button class="nav-tab" onclick="showPage('alarm',this)">⏰ ALARM</button>
  <button class="nav-tab" onclick="showPage('timer',this)">⏱ TIMER</button>
  <button class="nav-tab" onclick="showPage('stopwatch',this)">⏲ WATCH</button>
  <button class="nav-tab" onclick="showPage('world',this)">🌍 WORLD</button>
  <button class="nav-tab" onclick="showPage('settings',this)">⚙️ SETTINGS</button>
</div>

<!-- CLOCK PAGE -->
<div class="page active" id="page-clock">
  <div class="panel">
    <div id="clock">00:00:00</div>
    <div id="date">LOADING...</div>
  </div>

  <!-- 🔥 ALARM SCREEN -->
  <div class="ringing-banner" id="ringingBanner">
    <div class="ringing-title">⏰ WAKE UP!</div>
    <div class="ringing-label" id="ringingLabel">ALARM</div>

    <div class="snooze-btns">
      <button class="btn-snooze" onclick="snooze(5)">😴 5 MIN</button>
      <button class="btn-snooze" onclick="snooze(10)">😴 10 MIN</button>
      <button class="btn-snooze" onclick="snoozeCustom()">⏱ CUSTOM</button>
      <button class="btn btn-danger" onclick="stopAlarm()">■ STOP</button>
    </div>

    <div id="snoozeCount" style="font-size:0.6rem;color:var(--dim);margin-top:6px"></div>
  </div>
</div>

<!-- ALARM PAGE -->
<div class="page" id="page-alarm">
  <div class="panel">
    <div class="sec-label">SET NEW ALARM</div>

    <div style="display:flex;flex-direction:column;gap:10px">

      <div class="row">
        <input type="time" id="alarmTime">
        <input type="text" id="alarmLabel" placeholder="Label (optional)">
      </div>

      <div class="sec-label">CHOOSE SOUND</div>

      <div class="sound-grid">
        <button class="sound-btn selected" data-sound="rooster" onclick="selectSound('rooster',this)">🐓 Morning</button>
        <button class="sound-btn" data-sound="bell" onclick="selectSound('bell',this)">🔔 Bell</button>
        <button class="sound-btn" data-sound="beep" onclick="selectSound('beep',this)">📡 Beep</button>
        <button class="sound-btn" data-sound="chime" onclick="selectSound('chime',this)">🎵 Chime</button>
        <button class="sound-btn" data-sound="buzz" onclick="selectSound('buzz',this)">⚡ Buzz</button>
        <button class="sound-btn" data-sound="digital" onclick="selectSound('digital',this)">💻 Digital</button>
        <button class="sound-btn" data-sound="rain" onclick="selectSound('rain',this)">🌧 Rain Relax</button>
        <button class="sound-btn" data-sound="birds" onclick="selectSound('birds',this)">🐦 Nature</button>
        <button class="sound-btn" data-sound="ocean" onclick="selectSound('ocean',this)">🌊 Ocean</button>
        <button class="sound-btn" data-sound="custom" onclick="selectSound('custom',this)" id="customSoundBtn" style="grid-column:span 3">🎵 Custom Sound</button>
      </div>

      <!-- 🔥 NEW PREVIEW BUTTON -->
      <button class="btn btn-secondary" onclick="previewSound()">▶ Preview Sound</button>

      <div class="upload-btn" onclick="document.getElementById('customSoundFile').click()">
        📁 Upload MP3 / WAV
        <input type="file" id="customSoundFile" accept="audio/*" style="display:none" onchange="handleCustomSound(this)">
      </div>

      <div class="custom-sound-name" id="customSoundName"></div>

      <div class="range-row">
        <label>🔊 VOLUME</label>
        <input type="range" id="alarmVol" min="0" max="1" step="0.01" value="0.8">
        <span class="range-val">80%</span>
      </div>

      <button class="btn btn-primary" onclick="addAlarm()" style="width:100%">+ SET ALARM</button>

    </div>
  </div>
</div>

<!-- 🔥 STATUS BAR -->
<div class="status-bar">
  <div><span class="status-dot"></span>ONLINE</div>
  <div id="alarmCount">0 ALARMS</div>
  <div>v3.1.0</div>
</div>

</div>
<script>

// ── STATE ─────────────────────────────────
let alarms = JSON.parse(localStorage.getItem('alarms') || '[]');
let settings = JSON.parse(localStorage.getItem('settings') || '{"homeTz":"Asia/Kolkata","use24h":false,"theme":"cyber"}');

let selectedSound = 'rooster', customSoundURL = null;
let ringingId = null, snoozeCount = 0;

let timerInterval = null, timerRemaining = 0, timerRunning = false;
let swInterval = null, swRunning = false, swElapsed = 0;

// 🔥 SINGLE AUDIO CONTEXT (performance fix)
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── NAVIGATION ────────────────────────────
function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn) btn.classList.add('active');
}

// ── CLOCK ─────────────────────────────────
function updateClock(){
  const now = new Date();

  const opts = {
    timeZone: settings.homeTz,
    hour:'2-digit',minute:'2-digit',second:'2-digit',
    hour12:!settings.use24h
  };

  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US',opts);

  const dOpts = {
    timeZone:settings.homeTz,
    weekday:'long',day:'2-digit',month:'short',year:'numeric'
  };

  document.getElementById('date').textContent =
    now.toLocaleDateString('en-US',dOpts).toUpperCase();

  checkAlarms(now);
}

// ── ALARM LOGIC ───────────────────────────
function checkAlarms(now){
  if(ringingId !== null) return;

  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');

  if(now.getSeconds() !== 0) return;

  alarms.forEach(a=>{
    if(a.enabled && a.time === h+':'+m){
      triggerAlarm(a.id);
    }
  });
}

function triggerAlarm(id){
  ringingId = id;
  snoozeCount = 0;

  document.getElementById('clock').classList.add('alarm-on');
  document.getElementById('ringOverlay').classList.add('show');
  document.getElementById('ringingBanner').classList.add('show');

  playSound();
}

// 🔥 WAKE-UP CHALLENGE
function stopAlarm(){
  let ans = prompt("Solve to stop: 2 + 3 = ?");
  if(ans != "5") return;

  ringingId = null;
  snoozeCount = 0;

  document.getElementById('clock').classList.remove('alarm-on');
  document.getElementById('ringOverlay').classList.remove('show');
  document.getElementById('ringingBanner').classList.remove('show');

  stopAudio();
}

// 🔥 SNOOZE FIX (dynamic)
function snooze(mins){
  const alarm = alarms.find(a=>a.id===ringingId);
  if(!alarm) return;

  if(!mins) mins = alarm.snoozeTime || 10;

  snoozeCount++;
  const id = ringingId;

  stopAlarm();
  setTimeout(()=>triggerAlarm(id), mins*60000);
}

// ── SOUND SYSTEM ─────────────────────────
function playSound(){
  const ctx = audioCtx;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = 800;
  gain.gain.value = 0.2;

  osc.start();

  setTimeout(()=>{
    osc.stop();
  },1000);
}

// 🔥 PREVIEW SOUND
function previewSound(){
  playSound();
}

function stopAudio(){
  try{
    audioCtx.close();
  }catch(e){}
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// ── TIMER ────────────────────────────────
function startTimer(){
  if(timerRunning) return;

  const h = +document.getElementById('timerH').value || 0;
  const m = +document.getElementById('timerM').value || 0;
  const s = +document.getElementById('timerS').value || 0;

  timerRemaining = h*3600 + m*60 + s;
  if(!timerRemaining) return;

  timerRunning = true;

  timerInterval = setInterval(()=>{
    timerRemaining--;

    if(timerRemaining <= 0){
      clearInterval(timerInterval);
      timerRunning = false;
      playSound();
    }

  },1000);
}

// ── STOPWATCH ───────────────────────────
function startSW(){
  if(swRunning) return;

  swRunning = true;
  const start = Date.now() - swElapsed;

  swInterval = setInterval(()=>{
    swElapsed = Date.now() - start;

    let s = Math.floor(swElapsed/1000)%60;
    let m = Math.floor(swElapsed/60000)%60;
    let h = Math.floor(swElapsed/3600000);

    document.getElementById('swDisplay').textContent =
      String(h).padStart(2,'0')+':'+
      String(m).padStart(2,'0')+':'+
      String(s).padStart(2,'0');

  },1000);
}

// ── ALARM CRUD ──────────────────────────
function addAlarm(){

  showAd(); // 💰 future earning

  const time = document.getElementById('alarmTime').value;
  if(!time) return;

  alarms.push({
    id:Date.now(),
    time,
    enabled:true,
    snoozeTime:10
  });

  localStorage.setItem('alarms',JSON.stringify(alarms));
}

// 🔥 AD PLACEHOLDER
function showAd(){
  console.log("Ad will show here");
}

// ── INIT ────────────────────────────────
updateClock();
setInterval(updateClock,1000);

</script>
</body>
</html>
