<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Neo Alarm Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#060a0f;
--panel:#0d1520;
--border:#1a3a5c;
--glow:#00d4ff;
--glow2:#ff6b35;
--red:#ff3b3b;
--green:#00ff9d;
--text:#cde8ff;
--dim:#3a6080;
}

body{
background:var(--bg);
min-height:100vh;
font-family:'Share Tech Mono',monospace;
color:var(--text);
padding:12px;
overflow-x:hidden;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:520px;
display:flex;
flex-direction:column;
gap:14px;
}

.panel{
background:var(--panel);
border:1px solid var(--border);
padding:16px;
border-radius:6px;
}

.brand{
text-align:center;
}

.brand h1{
font-family:'Orbitron',sans-serif;
font-size:1.5rem;
color:var(--glow);
text-shadow:0 0 20px var(--glow);
}

.nav-tabs{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.nav-tab{
flex:1;
padding:10px;
border:none;
background:#09131d;
color:var(--dim);
border:1px solid var(--border);
cursor:pointer;
font-size:.65rem;
border-radius:4px;
}

.nav-tab.active{
background:rgba(0,212,255,.15);
color:var(--glow);
border-color:var(--glow);
}

.page{
display:none;
flex-direction:column;
gap:12px;
}

.page.active{
display:flex;
}

#clock{
font-size:4rem;
font-family:'Orbitron',sans-serif;
text-align:center;
color:var(--glow);
text-shadow:0 0 25px var(--glow);
}

#date{
text-align:center;
margin-top:8px;
color:var(--dim);
font-size:.7rem;
}

.sec-label{
font-size:.65rem;
color:var(--dim);
margin-bottom:10px;
}

.row{
display:flex;
gap:8px;
}

.row>*{
flex:1;
}

input,
select{
width:100%;
padding:10px;
background:#07111a;
border:1px solid var(--border);
color:var(--text);
border-radius:4px;
font-family:inherit;
}

input[type=time]{
font-size:1rem;
color:var(--glow);
font-family:'Orbitron',sans-serif;
}

.sound-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

.sound-btn{
padding:8px;
background:#07111a;
border:1px solid var(--border);
color:var(--dim);
cursor:pointer;
border-radius:4px;
font-size:.65rem;
}

.sound-btn.selected{
border-color:var(--glow);
color:var(--glow);
background:rgba(0,212,255,.1);
}

.btn{
padding:11px;
border:none;
border-radius:4px;
cursor:pointer;
font-family:'Orbitron',sans-serif;
font-size:.65rem;
}

.btn-primary{
background:var(--glow);
color:#000;
}

.btn-secondary{
background:transparent;
border:1px solid var(--glow);
color:var(--glow);
}

.btn-danger{
background:var(--red);
color:#fff;
}

.toggle{
position:relative;
width:42px;
height:22px;
display:inline-block;
}

.toggle input{
display:none;
}

.toggle-track{
position:absolute;
inset:0;
background:#08131d;
border:1px solid var(--border);
border-radius:20px;
}

.toggle-track::after{
content:'';
position:absolute;
width:16px;
height:16px;
left:2px;
top:2px;
background:var(--dim);
border-radius:50%;
transition:.3s;
}

.toggle input:checked + .toggle-track::after{
transform:translateX(18px);
background:var(--glow);
}

.toggle-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
}

.alarm-list{
display:flex;
flex-direction:column;
gap:8px;
}

.alarm-item{
padding:10px;
background:#07111a;
border:1px solid var(--border);
border-radius:4px;
}

.alarm-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.alarm-time-txt{
font-size:1.2rem;
font-family:'Orbitron',sans-serif;
color:var(--glow);
}

.alarm-actions{
display:flex;
gap:8px;
align-items:center;
}

.badge{
padding:3px 7px;
font-size:.6rem;
border:1px solid var(--border);
border-radius:3px;
margin-top:6px;
display:inline-block;
}

.btn-del{
width:24px;
height:24px;
border:none;
background:#1a0b0b;
color:#ff5555;
cursor:pointer;
border-radius:4px;
}

.timer-display,
.stopwatch-display{
font-size:3rem;
text-align:center;
font-family:'Orbitron',sans-serif;
color:var(--glow);
text-shadow:0 0 20px var(--glow);
}

.ringing-banner{
display:none;
padding:14px;
background:rgba(255,59,59,.1);
border:1px solid var(--red);
border-radius:4px;
text-align:center;
}

.ringing-banner.show{
display:block;
}

.world-clocks{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.world-item{
padding:10px;
background:#07111a;
border:1px solid var(--border);
border-radius:4px;
}

.world-time{
font-family:'Orbitron',sans-serif;
color:var(--glow);
font-size:1rem;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">
<h1>NEO ALARM CLOCK</h1>
</div>

<div class="nav-tabs">

<button class="nav-tab active"
onclick="showPage('clock',this)">
🕐 CLOCK
</button>

<button class="nav-tab"
onclick="showPage('alarm',this)">
⏰ ALARM
</button>

<button class="nav-tab"
onclick="showPage('timer',this)">
⏱ TIMER
</button>

<button class="nav-tab"
onclick="showPage('stopwatch',this)">
⏲ WATCH
</button>

<button class="nav-tab"
onclick="showPage('world',this)">
🌍 WORLD
</button>

</div>

<!-- CLOCK -->

<div class="page active" id="page-clock">

<div class="panel">

<div id="clock">
00:00:00
</div>

<div id="date">
LOADING...
</div>

</div>

<div class="ringing-banner" id="ringingBanner">

<h3>⏰ ALARM RINGING!</h3>

<div id="ringingLabel">
ALARM
</div>

<br>

<div class="row">

<button class="btn btn-secondary"
onclick="snooze(5)">
😴 5 MIN
</button>

<button class="btn btn-secondary"
onclick="snooze(10)">
😴 10 MIN
</button>

<button class="btn btn-danger"
onclick="stopAlarm()">
STOP
</button>

</div>

</div>

</div>

<!-- ALARM -->

<div class="page" id="page-alarm">

<div class="panel">

<div class="sec-label">
SET NEW ALARM
</div>

<div class="row">

<input type="time" id="alarmTime">

<input type="text"
id="alarmLabel"
placeholder="Label">

</div>

<br>

<div class="sound-grid">

<button class="sound-btn selected"
data-sound="rooster"
onclick="selectSound('rooster',this)">
🐓
</button>

<button class="sound-btn"
data-sound="bell"
onclick="selectSound('bell',this)">
🔔
</button>

<button class="sound-btn"
data-sound="beep"
onclick="selectSound('beep',this)">
📡
</button>

</div>

<br>

<div class="toggle-row">

<span>📳 Vibration</span>

<label class="toggle">

<input type="checkbox"
id="vibration"
checked>

<div class="toggle-track"></div>

</label>

</div>

<br>

<button class="btn btn-primary"
style="width:100%"
onclick="addAlarm()">

+ SET ALARM

</button>

</div>

<div class="panel">

<div class="sec-label">
MY ALARMS
</div>

<div class="alarm-list"
id="alarmList">

</div>

</div>

</div>

<!-- TIMER -->

<div class="page"
id="page-timer">

<div class="panel">

<div class="timer-display"
id="timerDisplay">

00:00:00

</div>

<br>

<div class="row">

<input type="number"
id="timerH"
placeholder="HH">

<input type="number"
id="timerM"
placeholder="MM">

<input type="number"
id="timerS"
placeholder="SS">

</div>

<br>

<div class="row">

<button class="btn btn-primary"
onclick="startTimer()">
START
</button>

<button class="btn btn-secondary"
onclick="pauseTimer()">
PAUSE
</button>

<button class="btn btn-secondary"
onclick="resetTimer()">
RESET
</button>

</div>

</div>

</div>
<!-- STOPWATCH -->

<div class="page"
id="page-stopwatch">

<div class="panel">

<div class="stopwatch-display"
id="swDisplay">

00:00:00.0

</div>

<br>

<div class="row">

<button class="btn btn-primary"
id="swStartBtn"
onclick="startSW()">

START

</button>

<button class="btn btn-secondary"
onclick="lapSW()">

LAP

</button>

<button class="btn btn-secondary"
onclick="resetSW()">

RESET

</button>

</div>

<br>

<div id="lapList"
class="alarm-list">

</div>

</div>

</div>

<!-- WORLD CLOCK -->

<div class="page"
id="page-world">

<div class="panel">

<div class="sec-label">
WORLD CLOCK
</div>

<div class="world-clocks"
id="worldClocks">

</div>

</div>

</div>

</div>

<script>

let alarms=
JSON.parse(
localStorage.getItem('alarms') || '[]'
);

let selectedSound='rooster';

let ringingId=null;

let currentAudio=null;

const soundFiles={

rooster:'sounds/Rooster.mp3',

bell:'sounds/Bell.mp3',

beep:'sounds/Beep.mp3'

};

const soundNames={

rooster:'🐓 Rooster',

bell:'🔔 Bell',

beep:'📡 Beep'

};

function showPage(page,btn){

document
.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document
.querySelectorAll('.nav-tab')
.forEach(t=>t.classList.remove('active'));

document
.getElementById('page-'+page)
.classList.add('active');

btn.classList.add('active');
}

function updateClock(){

const now=new Date();

document.getElementById('clock')
.textContent=

now.toLocaleTimeString(
'en-US',
{
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
}
);

document.getElementById('date')
.textContent=

now.toDateString();

checkAlarms(now);

updateWorldClocks(now);
}

function updateWorldClocks(now){

const cities=[

{
name:'🇮🇳 INDIA',
tz:'Asia/Kolkata'
},

{
name:'🇺🇸 NEW YORK',
tz:'America/New_York'
},

{
name:'🇬🇧 LONDON',
tz:'Europe/London'
},

{
name:'🇯🇵 TOKYO',
tz:'Asia/Tokyo'
}

];

document.getElementById('worldClocks')
.innerHTML=

cities.map(c=>`

<div class="world-item">

<div>
${c.name}
</div>

<div class="world-time">

${now.toLocaleTimeString(
'en-US',
{
timeZone:c.tz,
hour:'2-digit',
minute:'2-digit'
}
)}

</div>

</div>

`).join('');
}

function selectSound(sound,btn){

selectedSound=sound;

document
.querySelectorAll('.sound-btn')
.forEach(b=>b.classList.remove('selected'));

btn.classList.add('selected');
}

function addAlarm(){

const time=
document.getElementById('alarmTime').value;

if(!time){

alert('Select time');

return;
}

const label=
document.getElementById('alarmLabel').value || 'Alarm';

const vibration=
document.getElementById('vibration').checked;

const alarm={

id:Date.now(),

time,

label,

sound:selectedSound,

vibration,

enabled:true
};

alarms.push(alarm);

saveAlarms();

renderAlarms();

document.getElementById('alarmTime').value='';

document.getElementById('alarmLabel').value='';
}

function saveAlarms(){

localStorage.setItem(
'alarms',
JSON.stringify(alarms)
);
}

function renderAlarms(){

const list=
document.getElementById('alarmList');

if(!alarms.length){

list.innerHTML=
'<div>No alarms</div>';

return;
}

list.innerHTML=

alarms.map(a=>`

<div class="alarm-item">

<div class="alarm-top">

<div class="alarm-time-txt">

${a.time}

</div>

<div class="alarm-actions">

<label class="toggle">

<input type="checkbox"

${a.enabled ? 'checked' : ''}

onchange="toggleAlarm(${a.id})">

<div class="toggle-track"></div>

</label>

<button class="btn-del"
onclick="deleteAlarm(${a.id})">

×
</button>

</div>

</div>

<div class="badge">
${a.label}
</div>

<div class="badge">
${soundNames[a.sound]}
</div>

</div>

`).join('');
}

function toggleAlarm(id){

const alarm=
alarms.find(a=>a.id===id);

if(!alarm)return;

alarm.enabled=!alarm.enabled;

saveAlarms();

renderAlarms();
}

function deleteAlarm(id){

alarms=
alarms.filter(a=>a.id!==id);

saveAlarms();

renderAlarms();
}

function checkAlarms(now){

if(ringingId!==null)return;

const h=
String(now.getHours()).padStart(2,'0');

const m=
String(now.getMinutes()).padStart(2,'0');

if(now.getSeconds()!==0)return;

alarms.forEach(a=>{

if(
a.enabled &&
a.time===`${h}:${m}`
){

triggerAlarm(a.id);
}

});
}
  function triggerAlarm(id){

ringingId=id;

const alarm=
alarms.find(a=>a.id===id);

document
.getElementById('ringOverlay')
.classList.add('show');

document
.getElementById('ringingBanner')
.classList.add('show');

document
.getElementById('clock')
.classList.add('alarm-on');

document
.getElementById('ringingLabel')
.textContent=

alarm.label;

playAlarmSound(alarm);

if(
alarm.vibration &&
navigator.vibrate
){

navigator.vibrate([
500,200,
500,200,
500
]);
}

renderAlarms();
}

function playAlarmSound(alarm){

stopAlarmSound();

const path=
soundFiles[alarm.sound];

if(!path)return;

currentAudio=
new Audio(path);

currentAudio.loop=true;

currentAudio.volume=0.8;

currentAudio.play()
.catch(()=>{

console.log(
'Audio blocked'
);

});
}

function stopAlarmSound(){

if(currentAudio){

currentAudio.pause();

currentAudio.currentTime=0;

currentAudio=null;
}
}

function stopAlarm(){

ringingId=null;

stopAlarmSound();

document
.getElementById('ringOverlay')
.classList.remove('show');

document
.getElementById('ringingBanner')
.classList.remove('show');

document
.getElementById('clock')
.classList.remove('alarm-on');

if(navigator.vibrate){

navigator.vibrate(0);
}

renderAlarms();
}

/* TIMER */

let timerInterval=null;

let timerSeconds=0;

let timerRunning=false;

function startTimer(){

if(timerRunning)return;

if(timerSeconds<=0){

const h=
parseInt(
document.getElementById('timerH').value || 0
);

const m=
parseInt(
document.getElementById('timerM').value || 0
);

const s=
parseInt(
document.getElementById('timerS').value || 0
);

timerSeconds=
(h*3600)+(m*60)+s;
}

if(timerSeconds<=0){

alert('Enter time');

return;
}

timerRunning=true;

timerInterval=
setInterval(()=>{

timerSeconds--;

updateTimerDisplay();

if(timerSeconds<=0){

clearInterval(timerInterval);

timerRunning=false;

document
.getElementById('timerFinish')
.style.display='block';

const audio=
new Audio(soundFiles.beep);

audio.loop=true;

audio.play();

window.timerAudio=audio;
}

},1000);
}

function updateTimerDisplay(){

let h=
Math.floor(timerSeconds/3600);

let m=
Math.floor(
(timerSeconds%3600)/60
);

let s=
timerSeconds%60;

document
.getElementById('timerDisplay')
.textContent=

`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function pauseTimer(){

timerRunning=false;

clearInterval(timerInterval);
}

function resetTimer(){

pauseTimer();

timerSeconds=0;

updateTimerDisplay();

document
.getElementById('timerFinish')
.style.display='none';
}

function stopTimerAlarm(){

if(window.timerAudio){

window.timerAudio.pause();

window.timerAudio=null;
}

resetTimer();
}

/* STOPWATCH */

let swInterval=null;

let swRunning=false;

let swTime=0;

let laps=[];

function startSW(){

if(swRunning){

clearInterval(swInterval);

swRunning=false;

document
.getElementById('swStartBtn')
.textContent='START';

return;
}

swRunning=true;

document
.getElementById('swStartBtn')
.textContent='STOP';

swInterval=
setInterval(()=>{

swTime+=100;

updateSW();

},100);
}

function updateSW(){

let ms=
Math.floor(
(swTime%1000)/100
);

let sec=
Math.floor(
(swTime/1000)%60
);

let min=
Math.floor(
(swTime/60000)%60
);

let hr=
Math.floor(swTime/3600000);

document
.getElementById('swDisplay')
.textContent=

`${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${ms}`;
}

function lapSW(){

if(!swRunning)return;

laps.unshift(
document.getElementById('swDisplay').textContent
);

renderLaps();
}

function renderLaps(){

document
.getElementById('lapList')
.innerHTML=

laps.map((l,i)=>`

<div class="lap-item">

<div>
LAP ${laps.length-i}
</div>

<div class="lap-time">
${l}
</div>

</div>

`).join('');
}

function resetSW(){

clearInterval(swInterval);

swRunning=false;

swTime=0;

laps=[];

updateSW();

renderLaps();

document
.getElementById('swStartBtn')
.textContent='START';
}

/* INIT */

renderAlarms();

updateClock();

updateTimerDisplay();

updateSW();

setInterval(updateClock,1000);

</script>

</body>

</html>
