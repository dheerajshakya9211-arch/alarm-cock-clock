<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — Alarm Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a14;
  --bg-secondary: #12121f;
  --bg-card: #16162a;
  --bg-card-hover: #1c1c38;
  --border: #2a2a4a;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --accent: #a855f7;
  --accent-dim: rgba(168,85,247,0.15);
  --accent-glow: rgba(168,85,247,0.4);
  --accent-bright: #c084fc;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font-clock: 'Orbitron', monospace;
  --font-ui: 'Share Tech Mono', monospace;
  --tab-height: 64px;
}

[data-theme="dark"] {
  --bg-primary: #0d0d0d;
  --bg-secondary: #1a1a1a;
  --bg-card: #222;
  --bg-card-hover: #2a2a2a;
  --border: #333;
  --accent: #6366f1;
  --accent-dim: rgba(99,102,241,0.15);
  --accent-glow: rgba(99,102,241,0.4);
  --accent-bright: #818cf8;
}

[data-theme="matrix"] {
  --bg-primary: #000a00;
  --bg-secondary: #001200;
  --bg-card: #001a00;
  --bg-card-hover: #002200;
  --border: #004400;
  --accent: #00ff41;
  --accent-dim: rgba(0,255,65,0.1);
  --accent-glow: rgba(0,255,65,0.35);
  --accent-bright: #33ff66;
  --text-primary: #ccffcc;
  --text-secondary: #559955;
}

[data-theme="purple"] {
  --bg-primary: #0e0618;
  --bg-secondary: #160a24;
  --bg-card: #1e1030;
  --bg-card-hover: #28183e;
  --border: #3a2060;
  --accent: #d946ef;
  --accent-dim: rgba(217,70,239,0.12);
  --accent-glow: rgba(217,70,239,0.4);
  --accent-bright: #e879f9;
}

[data-theme="sunset"] {
  --bg-primary: #1a0a0a;
  --bg-secondary: #241010;
  --bg-card: #2e1616;
  --bg-card-hover: #3a1e1e;
  --border: #5a2a2a;
  --accent: #f97316;
  --accent-dim: rgba(249,115,22,0.12);
  --accent-glow: rgba(249,115,22,0.35);
  --accent-bright: #fb923c;
}

[data-theme="light"] {
  --bg-primary: #f0f0f5;
  --bg-secondary: #e4e4ec;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f5fa;
  --border: #d0d0dd;
  --text-primary: #1a1a2e;
  --text-secondary: #666680;
  --accent: #7c3aed;
  --accent-dim: rgba(124,58,237,0.1);
  --accent-glow: rgba(124,58,237,0.25);
  --accent-bright: #8b5cf6;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font-ui);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

body { display: flex; flex-direction: column; }

.app-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.tab-content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 16px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.tab-content-area::-webkit-scrollbar { width: 4px; }
.tab-content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* NAV */
.bottom-nav {
  display: flex;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  height: var(--tab-height);
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 9px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  text-transform: uppercase;
}
.nav-btn svg { width: 22px; height: 22px; transition: all 0.25s; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active svg { filter: drop-shadow(0 0 6px var(--accent-glow)); }
.nav-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 32px; height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  transition: transform 0.3s;
}
.nav-btn.active::before { transform: translateX(-50%) scaleX(1); }

/* CLOCK TAB */
.clock-display {
  text-align: center;
  padding: 20px 0 10px;
}

.analog-clock-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.analog-clock-wrap svg {
  width: 180px;
  height: 180px;
  filter: drop-shadow(0 0 20px var(--accent-dim));
}

.digital-time {
  font-family: var(--font-clock);
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text-primary);
  text-shadow: 0 0 30px var(--accent-glow);
  line-height: 1.1;
}
.digital-time .seconds-part {
  font-size: 24px;
  color: var(--accent);
  font-weight: 500;
}
.digital-time .ampm {
  font-size: 16px;
  color: var(--accent-bright);
  margin-left: 4px;
  font-weight: 500;
}

.date-display {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 1px;
}

.next-alarm-info {
  margin-top: 16px;
  padding: 10px 16px;
  background: var(--accent-dim);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--accent-bright);
  display: inline-block;
}
.next-alarm-info.hidden { display: none; }

/* CARDS */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  transition: background 0.2s;
}
.card:hover { background: var(--bg-card-hover); }

.card-title {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
}

/* FORM ELEMENTS */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: center;
}

input[type="text"], input[type="number"], input[type="time"], select {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim);
}
select { cursor: pointer; }
input[type="time"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7);
}

.btn {
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 0.8px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover {
  box-shadow: 0 0 16px var(--accent-glow);
  filter: brightness(1.1);
}
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-card-hover); }
.btn-danger {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
}
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-icon {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover { color: var(--accent); background: var(--accent-dim); }
.btn-icon svg { width: 18px; height: 18px; }

/* TOGGLE */
.toggle-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.toggle-label { font-size: 13px; color: var(--text-secondary); }
.toggle {
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}
.toggle.active { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: transform 0.3s;
}
.toggle.active::after { transform: translateX(20px); }

/* ALARM LIST */
.alarm-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.alarm-item:last-child { border-bottom: none; }
.alarm-time-label { flex: 1; }
.alarm-time-label .a-time {
  font-family: var(--font-clock);
  font-size: 22px;
  font-weight: 600;
}
.alarm-time-label .a-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.alarm-actions { display: flex; gap: 4px; align-items: center; }

/* TIMER */
.timer-display {
  text-align: center;
  padding: 30px 0;
}
.timer-digits {
  font-family: var(--font-clock);
  font-size: 56px;
  font-weight: 700;
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--accent-glow);
}
.timer-inputs {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}
.timer-input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.timer-input-group input {
  width: 64px;
  text-align: center;
  font-family: var(--font-clock);
  font-size: 20px;
  padding: 8px;
}
.timer-input-group label {
  font-size: 10px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.timer-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

/* STOPWATCH */
.stopwatch-display {
  text-align: center;
  padding: 30px 0;
}
.stopwatch-digits {
  font-family: var(--font-clock);
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--accent-glow);
}
.stopwatch-ms {
  font-size: 28px;
  color: var(--accent);
}
.stopwatch-controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}
.lap-list {
  margin-top: 16px;
  max-height: 200px;
  overflow-y: auto;
}
.lap-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.lap-item .lap-num { color: var(--text-secondary); }
.lap-item .lap-diff { color: var(--accent-bright); font-size: 11px; }

/* WORLD CLOCK */
.world-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.world-item:last-child { border-bottom: none; }
.world-city { font-size: 14px; }
.world-city-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.world-time {
  font-family: var(--font-clock);
  font-size: 20px;
  font-weight: 600;
  text-align: right;
}
.world-time-date { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-align: right; }
.world-offset {
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 6px;
  border-radius: 4px;
  margin-top: 4px;
  display: inline-block;
}

/* SETTINGS */
.settings-group {
  margin-bottom: 20px;
}
.settings-group-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  margin-bottom: 10px;
}
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 13px; }
.setting-control select {
  width: auto;
  min-width: 130px;
}

/* TOAST */
.toast-container {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  max-width: 400px;
  width: calc(100% - 32px);
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: var(--shadow);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--accent); }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-12px); }
}

/* ALARM BANNER */
.alarm-banner {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  animation: bannerPulse 1.5s ease infinite;
  display: none;
}
.alarm-banner.active { display: flex; }

@keyframes bannerPulse {
  0%,100% { background: rgba(0,0,0,0.85); }
  50% { background: rgba(168,85,247,0.15); }
}

.alarm-banner .ring-icon {
  width: 80px; height: 80px;
  animation: ringShake 0.4s ease infinite;
}
@keyframes ringShake {
  0%,100% { transform: rotate(0); }
  25% { transform: rotate(15deg); }
  75% { transform: rotate(-15deg); }
}
.alarm-banner .ring-time {
  font-family: var(--font-clock);
  font-size: 48px;
  font-weight: 700;
  text-shadow: 0 0 30px var(--accent-glow);
}
.alarm-banner .ring-label {
  font-size: 16px;
  color: var(--text-secondary);
}
.alarm-banner .ring-actions {
  display: flex;
  gap: 16px;
  margin-top: 10px;
}
.alarm-banner .btn-dismiss {
  background: var(--danger);
  color: #fff;
  border: none;
  padding: 14px 32px;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.alarm-banner .btn-snooze {
  background: var(--accent-dim);
  color: var(--accent-bright);
  border: 1px solid var(--accent);
  padding: 14px 32px;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* PROGRESS RING */
.timer-ring-wrap {
  position: relative;
  display: inline-block;
}
.timer-ring-wrap svg { transform: rotate(-90deg); }
.timer-ring-wrap .timer-ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SCROLLBAR */
.tab-content-area::-webkit-scrollbar { width: 3px; }
.tab-content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--font-clock);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* COLOR CHIPS */
.theme-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.theme-chip {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.theme-chip.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
.theme-chip.active::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
}

.chip-cyber { background: linear-gradient(135deg, #a855f7, #0a0a14); }
.chip-dark { background: linear-gradient(135deg, #6366f1, #0d0d0d); }
.chip-matrix { background: linear-gradient(135deg, #00ff41, #000a00); }
.chip-purple { background: linear-gradient(135deg, #d946ef, #0e0618); }
.chip-sunset { background: linear-gradient(135deg, #f97316, #1a0a0a); }
.chip-light { background: linear-gradient(135deg, #7c3aed, #f0f0f5); }

.sound-select-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.sound-select-row select { flex: 1; }
.preview-btn {
  background: var(--accent-dim);
  border: 1px solid var(--border);
  color: var(--accent);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.preview-btn:hover { background: var(--accent); color: #fff; }
.preview-btn svg { width: 16px; height: 16px; }

.upload-area {
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.upload-area:hover { border-color: var(--accent); color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 30px 0;
  color: var(--text-secondary);
  font-size: 13px;
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 10px; opacity: 0.3; }

@media (max-width: 380px) {
  .digital-time { font-size: 40px; }
  .digital-time .seconds-part { font-size: 20px; }
  .timer-digits { font-size: 42px; }
  .stopwatch-digits { font-size: 38px; }
  .analog-clock-wrap svg { width: 150px; height: 150px; }
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="alarm-banner" id="alarmBanner">
  <svg class="ring-icon" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    <line x1="12" y1="1" x2="12" y2="3"/>
  </svg>
  <div class="ring-time" id="ringTime">07:30</div>
  <div class="ring-label" id="ringLabel">Alarm</div>
  <div class="ring-actions">
    <button class="btn-snooze" id="btnSnooze">Snooze</button>
    <button class="btn-dismiss" id="btnDismiss">Dismiss</button>
  </div>
</div>

<div class="app-container">
  <div class="tab-content-area">

    <!-- CLOCK TAB -->
    <div class="tab-panel active" id="panelClock">
      <div class="clock-display">
        <div class="analog-clock-wrap">
          <svg viewBox="0 0 200 200" id="analogClock">
            <circle cx="100" cy="100" r="95" fill="none" stroke="var(--border)" stroke-width="2"/>
            <circle cx="100" cy="100" r="90" fill="var(--bg-secondary)" opacity="0.5"/>
            <!-- hour markers -->
            <g id="clockMarkers"></g>
            <!-- hands -->
            <line id="handHour" x1="100" y1="100" x2="100" y2="50" stroke="var(--text-primary)" stroke-width="4" stroke-linecap="round"/>
            <line id="handMinute" x1="100" y1="100" x2="100" y2="30" stroke="var(--text-primary)" stroke-width="2.5" stroke-linecap="round"/>

<script>
// ==================== STATE ====================

    snoozeTime:'स्नूज़ (मिनट)', snoozeLimit:'स्नूज़ सीमा', gradualVolume:'धीरे-धीरे आवाज़',
    vibration:'कंपन', save:'सहेजें', cancel:'रद्द करें', noAlarms:'कोई अलार्म नहीं',
    timer:'टाइमर', hours:'घंटे', minutes:'मिनट', seconds:'सेकंड', start:'शुरू', pause:'रुकें',
    resume:'जारी', reset:'रीसेट', stopwatch:'स्टॉपवॉच', lap:'लैप', worldClock:'विश्व घड़ी',
    settings:'सेटिंग्स', appearance:'दिखावट', theme:'थीम', language:'भाषा',
    clock_settings:'घड़ी', '24hFormat':'24-घंटे प्रारूप', homeTimezone:'होम टाइमज़ोन',
    data:'डेटा', clearAllAlarms:'सभी अलार्म हटाएं', tabClock:'घड़ी', tabAlarm:'अलार्म',
    tabTimer:'टाइमर', tabStopwatch:'SW', tabWorld:'विश्व', tabSettings:'सेट',
    alarmSaved:'अलार्म सहेजा गया', alarmDeleted:'अलार्म हटाया', alarmsCleared:'सभी अलार्म हटाए',
    timerDone:'टाइमर पूरा!', snoozeMsg:'{m} मिनट के लिए स्नूज़', dismiss:'खारिज', snooze:'स्नूज़',
    on:'चालू', off:'बंद'
  }
};

function t(key) { return (LANG[STATE.settings.lang] || LANG.en)[key] || key; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (LANG[STATE.settings.lang] && LANG[STATE.settings.lang][k]) el.textContent = LANG[STATE.settings.lang][k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph');
    if (LANG[STATE.settings.lang] && LANG[STATE.settings.lang][k]) el.placeholder = LANG[STATE.settings.lang][k];
  });
}

// ==================== PERSISTENCE ====================
function saveState() {
  localStorage.setItem('chronos_alarms', JSON.stringify(STATE.alarms));
  localStorage.setItem('chronos_settings', JSON.stringify(STATE.settings));
}
function loadState() {
  try {
    const a = localStorage.getItem('chronos_alarms');
    const s = localStorage.getItem('chronos_settings');
    if (a) STATE.alarms = JSON.parse(a);
    if (s) Object.assign(STATE.settings, JSON.parse(s));
  } catch(e) {}
}

// ==================== TOAST ====================
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3200);
}

// ==================== SOUND SYSTEM ====================
const SOUND_FILES = {
  rooster: 'sounds/rooster.mp3',
  bell: 'sounds/bell.mp3',
  beep: 'sounds/beep.mp3',
  chime: 'sounds/chime.mp3',
  buzz: 'sounds/buzz.mp3',
  digital: 'sounds/digital.mp3',
  rain: ['Rain.mp3', 'sounds/rain.mp3'],
  birds: ['bird.mp3', 'sounds/birds.mp3'],
  ocean: ['Ocean.mp3', 'sounds/ocean.mp3']
};

let audioCtx = null;
let currentAudio = null;
let customSoundData = {};
let previewAudio = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function synthSound(type, duration=2) {
  return new Promise(resolve => {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    const configs = {
      rooster: {f:800,t:'sawtooth',mod:true},
      bell: {f:880,t:'sine',mod:false},
      beep: {f:1000,t:'square',mod:false},
      chime: {f:660,t:'sine',mod:false},
      buzz: {f:220,t:'sawtooth',mod:false},
      digital: {f:1200,t:'square',mod:true},
      rain: {f:200,t:'sawtooth',mod:false,noise:true},
      birds: {f:2000,t:'sine',mod:true},
      ocean: {f:150,t:'sine',mod:false,noise:true}
    };

    const cfg = configs[type] || configs.beep;
    osc.type = cfg.t;
    osc.frequency.value = cfg.f;

    if (cfg.mod) {
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = 5;
      lfoGain.gain.value = cfg.f * 0.3;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start();
      setTimeout(() => lfo.stop(), duration * 1000);
    }

    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

    osc.start();
    osc.stop(ctx.currentTime + duration);
    osc.onended = resolve;
  });
}

function tryLoadAudio(src) {
  return new Promise((resolve, reject) => {
    const a = new Audio();
    a.preload = 'auto';
    a.oncanplaythrough = () => resolve(a);
    a.onerror = () => reject();
    a.src = src;
    setTimeout(() => reject(), 2000);
  });
}

async function playSound(type, options = {}) {
  stopSound();

  const { gradual = false, loop = true } = options;

  // Custom uploaded sound
  if (type === 'custom' && customSoundData.url) {
    try {
      const a = new Audio(customSoundData.url);
      a.loop = loop;
      if (gradual) { a.volume = 0.05; gradualIncrease(a); } else a.volume = 1;
      await a.play();
      currentAudio = a;
      return;
    } catch(e) {}
  }

  // Try MP3 files
  const paths = SOUND_FILES[type];
  if (paths) {
    const tryPaths = Array.isArray(paths) ? paths : [paths];
    for (const p of tryPaths) {
      try {
        const a = await tryLoadAudio(p);
        a.loop = loop;
        if (gradual) { a.volume = 0.05; gradualIncrease(a); } else a.volume = 1;
        await a.play();
        currentAudio = a;
        return;
      } catch(e) {}
    }
  }

  // Fallback synth
  const synthLoop = async () => {
    if (!currentAudio || currentAudio._stopped) return;
    await synthSound(type, 2);
    if (loop && currentAudio && !currentAudio._stopped) setTimeout(synthLoop, 500);
  };
  currentAudio = { _stopped: false, pause() { this._stopped = true; } };
  synthLoop();
}

function gradualIncrease(audio) {
  let vol = 0.05;
  const iv = setInterval(() => {
    if (!currentAudio || audio.paused) { clearInterval(iv); return; }
    vol = Math.min(1, vol + 0.03);
    audio.volume = vol;
    if (vol >= 1) clearInterval(iv);
  }, 500);
}

function stopSound() {
  if (currentAudio) {
    if (currentAudio.pause) currentAudio.pause();
    if (currentAudio._stopped !== undefined) currentAudio._stopped = true;
    currentAudio = null;
  }
  if (previewAudio) {
    previewAudio.pause();
    previewAudio = null;
  }
}

async function previewSound(type) {
  if (previewAudio) { previewAudio.pause(); previewAudio = null; }

  if (type === 'custom' && customSoundData.url) {
    previewAudio = new Audio(customSoundData.url);
    previewAudio.volume = 0.7;
    previewAudio.play().catch(()=>{});
    setTimeout(() => { if(previewAudio) previewAudio.pause(); }, 3000);
    return;
  }

  const paths = SOUND_FILES[type];
  if (paths) {
    const tryPaths = Array.isArray(paths) ? paths : [paths];
    for (const p of tryPaths) {
      try {
        const a = await tryLoadAudio(p);
        a.volume = 0.7;
        await a.play();
        previewAudio = a;
        setTimeout(() => { if(previewAudio) previewAudio.pause(); }, 3000);
        return;
      } catch(e) {}
    }
  }
  synthSound(type, 2);
}

// ==================== CLOCK ====================
function initClockMarkers() {
  const g = document.getElementById('clockMarkers');
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30) * Math.PI / 180;
    const isMain = i % 3 === 0;
    const r1 = isMain ? 78 : 82;
    const r2 = 88;
    const x1 = 100 + r1 * Math.sin(angle);
    const y1 = 100 - r1 * Math.cos(angle);
    const x2 = 100 + r2 * Math.sin(angle);
    const y2 = 100 - r2 * Math.cos(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', isMain ? 'var(--accent)' : 'var(--text-secondary)');
    line.setAttribute('stroke-width', isMain ? '2.5' : '1');
    line.setAttribute('stroke-linecap', 'round');
    g.appendChild(line);
  }
  // minute dots
  for (let i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    const angle = (i * 6) * Math.PI / 180;
    const r = 88;
    const cx = 100 + r * Math.sin(angle);
    const cy = 100 - r * Math.cos(angle);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cx);
    c.setAttribute('cy', cy);
    c.setAttribute('r', '0.8');
    c.setAttribute('fill', 'var(--border)');
    g.appendChild(c);
  }
}

function setHand(id, angle) {
  const el = document.getElementById(id);
  el.setAttribute('transform', `rotate(${angle}, 100, 100)`);
}

function updateClock() {
  const now = new Date();
  let tz;
  try {
    now.toLocaleString('en', { timeZone: STATE.settings.homeTz });
    tz = STATE.settings.homeTz;
  } catch(e) {
    tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  }

  const parts = new Intl.DateTimeFormat('en', {
    timeZone: tz, hour:'numeric', minute:'numeric', second:'numeric', hour12: false
  }).formatToParts(now);

  let h = 0, m = 0, s = 0;
  parts.forEach(p => {
    if (p.type === 'hour') h = parseInt(p.value);
    if (p.type === 'minute') m = parseInt(p.value);
    if (p.type === 'second') s = parseInt(p.value);
  });

  // Analog
  const secAngle = s * 6;
  const minAngle = m * 6 + s * 0.1;
  const hourAngle = (h % 12) * 30 + m * 0.5;
  setHand('handSecond', secAngle);
  setHand('handMinute', minAngle);
  setHand('handHour', hourAngle);

  // Digital
  const is24 = STATE.settings.is24h;
  let displayH = h;
  let ampm = '';
  if (!is24) {
    ampm = h >= 12 ? 'PM' : 'AM';
    displayH = h % 12 || 12;
  }
  const hStr = is24 ? String(h).padStart(2,'0') : String(displayH).padStart(2,'0');
  const mStr = String(m).padStart(2,'0');
  const sStr = String(s).padStart(2,'0');

  document.getElementById('digitalTime').innerHTML =
    `${hStr}:${mStr}<span class="seconds-part">:${sStr}</span>${!is24 ? `<span class="ampm">${ampm}</span>` : ''}`;

  // Date
  const lang = STATE.settings.lang === 'hi' ? 'hi-IN' : 'en-US';
  const dateStr = now.toLocaleDateString(lang, {
    timeZone: tz, weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
  document.getElementById('dateDisplay').textContent = dateStr;

  // Next alarm
  updateNextAlarm(h, m, now);

  // Check alarms
  checkAlarms(h, m, s);
}

function updateNextAlarm(currentH, currentM, now) {
  const el = document.getElementById('nextAlarmInfo');
  const txt = document.getElementById('nextAlarmText');
  const active = STATE.alarms.filter(a => a.enabled);
  if (!active.length) { el.classList.add('hidden'); return; }

  const currentMin = currentH * 60 + currentM;
  let minDiff = Infinity;
  let nextLabel = '';

  active.forEach(a => {
    const [ah, am] = a.time.split(':').map(Number);
    let aMin = ah * 60 + am;
    let diff = aMin - currentMin;
    if (diff <= 0) diff += 1440;
    if (diff < minDiff) { minDiff = diff; nextLabel = a.label || a.time; }
  });

  const hrs = Math.floor(minDiff / 60);
  const mins = minDiff % 60;
  let timeStr = '';
  if (hrs > 0) timeStr += `${hrs}h `;
  timeStr += `${mins}m`;

  txt.textContent = `⏰ ${nextLabel} — ${timeStr}`;
  el.classList.remove('hidden');
}

// ==================== ALARM SYSTEM ====================
let ringingAlarm = null;
let snoozeCount = 0;

function checkAlarms(h, m, s) {
  if (s !== 0) return;
  if (ringingAlarm) return;

  const timeStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  const alarm = STATE.alarms.find(a => a.enabled && a.time === timeStr);
  if (alarm) triggerAlarm(alarm);
}

function triggerAlarm(alarm) {
  ringingAlarm = alarm;
  snoozeCount = 0;
  showAlarmBanner(alarm);
  playSound(alarm.sound, { gradual: alarm.gradual, loop: true });
  if (alarm.vibrate && navigator.vibrate) {
    navigator.vibrate([500,200,500,200,500,200,500]);
  }
}

function showAlarmBanner(alarm) {
  const banner = document.getElementById('alarmBanner');
  document.getElementById('ringTime').textContent = alarm.time;
  document.getElementById('ringLabel').textContent = alarm.label || t('alarms');
  banner.classList.add('active');
}

function dismissAlarm() {
  document.getElementById('alarmBanner').classList.remove('active');
  stopSound();
  if (navigator.vibrate) navigator.vibrate(0);
  ringingAlarm = null;
  snoozeCount = 0;
}

function snoozeAlarm() {
  if (!ringingAlarm) return;
  const alarm = ringingAlarm;
  const limit = parseInt(alarm.snoozeLimit);
  if (limit > 0 && snoozeCount >= limit) {
    toast('Snooze limit reached', 'error');
    dismissAlarm();
    return;
  }

  stopSound();
  if (navigator.vibrate) navigator.vibrate(0);
  document.getElementById('alarmBanner').classList.remove('active');

  const snoozeMin = alarm.snoozeCustom || alarm.snooze || 10;
  snoozeCount++;
  toast(t('snoozeMsg').replace('{m}', snoozeMin), 'info');

  setTimeout(() => {
    if (ringingAlarm === alarm) {
      showAlarmBanner(alarm);
      playSound(alarm.sound, { gradual: alarm.gradual, loop: true });
      if (alarm.vibrate && navigator.vibrate) navigator.vibrate([500,200,500,200,500]);
    }
  }, snoozeMin * 60 * 1000);
}

document.getElementById('btnDismiss').addEventListener('click', dismissAlarm);
document.getElementById('btnSnooze').addEventListener('click', snoozeAlarm);

function renderAlarms() {
  alarmList.innerHTML = '';
  if (!STATE.alarms.length) {
    alarmEmpty.style.display = 'block';

  }

  STATE.alarms.forEach(alarm => {
    const div = document.createElement('div');
    div.className = 'alarm-item';

    let displayTime = alarm.time;
    if (!STATE.settings.is24h) {
      const [h, m] = alarm.time.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      displayTime = `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
    }

    const soundEmojis = {rooster:'🐓',bell:'🔔',beep:'📟',chime:'🎵',buzz:'📳',digital:'💻',rain:'🌧️',birds:'🐦',ocean:'🌊',custom:'📁'};

    div.innerHTML = `
      <div class="alarm-time-label">
        <div class="a-time" style="opacity:${alarm.enabled?1:0.4}">${displayTime}</div>
        <div class="a-label">${alarm.label ? alarm.label + ' • ' : ''}${soundEmojis[alarm.sound]||'🔔'} ${alarm.sound}</div>
      </div>
      <div class="alarm-actions">
        <div class="toggle ${alarm.enabled?'active':''}" data-alarm-id="${alarm.id}"></div>
        <button class="btn-icon" data-delete-id="${alarm.id}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    `;
    alarmList.appendChild(div);

    div.querySelector(`[data-alarm-id="${alarm.id}"]`).addEventListener('click', function() {
      this.classList.toggle('active');
      alarm.enabled = this.classList.contains('active');
      saveState();
      renderAlarms();
    });

    div.querySelector(`[data-delete-id="${alarm.id}"]`).addEventListener('click', () => {
      STATE.alarms = STATE.alarms.filter(a => a.id !== alarm.id);
      saveState();
      renderAlarms();
      toast(t('alarmDeleted'), 'info');
    });
  });
}

// ==================== TIMER ====================
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let timerRunning = false;

const timerDigits = document.getElementById('timerDigits');
const timerRing = document.getElementById('timerRing');
const timerInputs = document.getElementById('timerInputs');
const btnTimerStart = document.getElementById('btnTimerStart');
const btnTimerPause = document.getElementById('btnTimerPause');
const btnTimerResume = document.getElementById('btnTimerResume');
const btnTimerReset = document.getElementById('btnTimerReset');

function formatTimer(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay() {
  timerDigits.textContent = formatTimer(timerRemaining);
  const progress = timerTotal > 0 ? (1 - timerRemaining / timerTotal) : 0;
  timerRing.setAttribute('stroke-dashoffset', (progress * 628.32).toFixed(2));
}

function timerTick() {
  if (timerRemaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    timerRemaining = 0;
    updateTimerDisplay();
    timerDone();
    showTimerIdle();
    return;
  }
  timerRemaining--;
  updateTimerDisplay();
}

function timerDone() {
  toast(t('timerDone'), 'success');
  playSound('chime', { gradual: false, loop: false });
  if (navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
}

function showTimerRunning() {
  timerInputs.style.display = 'none';
  btnTimerStart.style.display = 'none';
  btnTimerPause.style.display = '';
  btnTimerResume.style.display = 'none';
  btnTimerReset.style.display = '';
}

function showTimerPaused() {
  btnTimerPause.style.display = 'none';
  btnTimerResume.style.display = '';
}

function showTimerIdle() {
  timerInputs.style.display = '';
  btnTimerStart.style.display = '';
  btnTimerPause.style.display = 'none';
  btnTimerResume.style.display = 'none';
  btnTimerReset.style.display = 'none';
}

btnTimerStart.addEventListener('click', () => {
  const h = parseInt(document.getElementById('timerH').value) || 0;
  const m = parseInt(document.getElementById('timerM').value) || 0;
  const s = parseInt(document.getElementById('timerS').value) || 0;
  timerTotal = h * 3600 + m * 60 + s;
  if (timerTotal <= 0) return;
  timerRemaining = timerTotal;
  updateTimerDisplay();
  timerRunning = true;
  timerInterval = setInterval(timerTick, 1000);
  showTimerRunning();
});

btnTimerPause.addEventListener('click', () => {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  showTimerPaused();
});

btnTimerResume.addEventListener('click', () => {
  timerRunning = true;
  timerInterval = setInterval(timerTick, 1000);
  showTimerRunning();
});

btnTimerReset.addEventListener('click', () => {
  clearInterval(timerInterval);
  timerInterval = null;
  timerRunning = false;
  timerRemaining = 0;
  timerTotal = 0;
  updateTimerDisplay();
  timerRing.setAttribute('stroke-dashoffset', '0');
  showTimerIdle();
});

// ==================== STOPWATCH ====================
let swInterval = null;
let swStart = 0;
let swElapsed = 0;
let swRunning = false;
let laps = [];
let lastLapTime = 0;

const swDigits = document.getElementById('swDigits');
const lapList = document.getElementById('lapList');

function formatSW(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<span class="stopwatch-ms">.${String(cs).padStart(2,'0')}</span>`;
}

function formatSWPlain(ms) {
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function swTick() {
  swElapsed = Date.now() - swStart;
  swDigits.innerHTML = formatSW(swElapsed);
}

const btnSwStart = document.getElementById('btnSwStart');
const btnSwPause = document.getElementById('btnSwPause');
const btnSwResume = document.getElementById('btnSwResume');
const btnSwLap = document.getElementById('btnSwLap');
const btnSwReset = document.getElementById('btnSwReset');

btnSwStart.addEventListener('click', () => {
  swStart = Date.now();
  swElapsed = 0;
  laps = [];
  lastLapTime = 0;
  lapList.innerHTML = '';
  swRunning = true;
  swInterval = setInterval(swTick, 33);
  btnSwStart.style.display = 'none';
  btnSwPause.style.display = '';
  btnSwLap.style.display = '';
  btnSwReset.style.display = '';
});

btnSwPause.addEventListener('click', () => {
  clearInterval(swInterval);
  swRunning = false;
  btnSwPause.style.display = 'none';
  btnSwResume.style.display = '';
});

btnSwResume.addEventListener('click', () => {
  swStart = Date.now() - swElapsed;
  swInterval = setInterval(swTick, 33);
  swRunning = true;
  btnSwResume.style.display = 'none';
  btnSwPause.style.display = '';
});

btnSwLap.addEventListener('click', () => {
  if (!swRunning) return;
  const diff = swElapsed - lastLapTime;
  lastLapTime = swElapsed;
  laps.push({ total: swElapsed, diff });
  renderLaps();
});

btnSwReset.addEventListener('click', () => {
  clearInterval(swInterval);
  swRunning = false;
  swElapsed = 0;
  laps = [];
  lastLapTime = 0;
  swDigits.innerHTML = formatSW(0);
  lapList.innerHTML = '';
  btnSwStart.style.display = '';
  btnSwPause.style.display = 'none';
  btnSwResume.style.display = 'none';
  btnSwLap.style.display = 'none';
  btnSwReset.style.display = 'none';
});

function renderLaps() {
  lapList.innerHTML = '';
  [...laps].reverse().forEach((lap, i) => {
    const num = laps.length - i;
    const d = document.createElement('div');
    d.className = 'lap-item';
    d.innerHTML = `<span class="lap-num">Lap ${num}</span><span class="lap-diff">+${formatSWPlain(lap.diff)}</span><span>${formatSWPlain(lap.total)}</span>`;
    lapList.appendChild(d);
  });
}

// ==================== WORLD CLOCK ====================
const WORLD_CITIES = [
  { city: 'New York', tz: 'America/New_York', flag: '🇺🇸' },
  { city: 'London', tz: 'Europe/London', flag: '🇬🇧' },
  { city: 'Tokyo', tz: 'Asia/Tokyo', flag: '🇯🇵' },
  { city: 'Sydney', tz: 'Australia/Sydney', flag: '🇦🇺' },
  { city: 'Dubai', tz: 'Asia/Dubai', flag: '🇦🇪' },
  { city: 'Mumbai', tz: 'Asia/Kolkata', flag: '🇮🇳' },
  { city: 'Paris', tz: 'Europe/Paris', flag: '🇫🇷' },
  { city: 'Los Angeles', tz: 'America/Los_Angeles', flag: '🇺🇸' }
];

function updateWorldClocks() {
  const container = document.getElementById('worldList');
  const now = new Date();
  const is24 = STATE.settings.is24h;

  container.innerHTML = WORLD_CITIES.map(c => {
    const timeStr = now.toLocaleTimeString(STATE.settings.lang === 'hi' ? 'hi-IN' : 'en-US', {
      timeZone: c.tz, hour: '2-digit', minute: '2-digit', hour12: !is24
    });
    const dateStr = now.toLocaleDateString(STATE.settings.lang === 'hi' ? 'hi-IN' : 'en-US', {
      timeZone: c.tz, weekday: 'short', month: 'short', day: 'numeric'
    });

    // Offset calc
    const homeOff = getOffsetMinutes(STATE.settings.homeTz, now);
    const cityOff = getOffsetMinutes(c.tz, now);
    const diffH = (cityOff - homeOff) / 60;
    const sign = diffH >= 0 ? '+' : '';

    return `<div class="world-item">
      <div>
        <div class="world-city">${c.flag} ${c.city}</div>
        <div class="world-city-sub">${dateStr}</div>
        <span class="world-offset">${sign}${diffH}h</span>
      </div>
      <div>
        <div class="world-time">${timeStr}</div>
      </div>
    </div>`;
  }).join('');
}

function getOffsetMinutes(tz, date) {
  const str = date.toLocaleString('en-US', { timeZone: tz, timeZoneName: 'shortOffset' });
  const match = str.match(/GMT([+-]?\d+(?::\d+)?)/);
  if (!match) return 0;
  const parts = match[1].split(':');
  let mins = parseInt(parts[0]) * 60;
  if (parts[1]) mins += (mins < 0 ? -1 : 1) * parseInt(parts[1]);
  return mins;
}

function populateTimezones() {
  const sel = document.getElementById('homeTzSelect');

    ['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Anchorage',
     'Pacific/Honolulu','Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow',
     'Asia/Tokyo','Asia/Shanghai','Asia/Kolkata','Asia/Dubai','Australia/Sydney',
     'Pacific/Auckland','Africa/Cairo','Africa/Lagos','America/Sao_Paulo'];

  zones.forEach(z => {
    const opt = document.createElement('option');
    opt.value = z;
    opt.textContent = z.replace(/_/g,' ');
    if (z === STATE.settings.homeTz) opt.selected = true;
    sel.appendChild(opt);
  });
}

  STATE.settings.theme = theme;

    document.documentElement.removeAttribute('data-theme');

    document.documentElement.setAttribute('data-theme', theme);
  }
  document.querySelectorAll('.theme-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.theme === theme);

  saveState();
}

  populateTimezones();
  renderAlarms();
  updateClock();
  updateWorldClocks();

  setInterval(updateClock, 1000);
  setInterval(updateWorldClocks, 30000);
}

init();
