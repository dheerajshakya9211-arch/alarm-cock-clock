<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Alarm Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}body{ background:#060a0f; color:#cde8ff; font-family:'Orbitron',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }

.container{ width:100%; max-width:500px; background:#0d1520; border:1px solid #1a3a5c; border-radius:10px; padding:20px; box-shadow:0 0 20px rgba(0,212,255,0.2); }

h1{ text-align:center; color:#00d4ff; margin-bottom:20px; }

#clock{ font-size:60px; text-align:center; color:#00d4ff; text-shadow:0 0 15px #00d4ff; margin-bottom:10px; }

#date{ text-align:center; margin-bottom:25px; color:#aaa; }

.tabs{ display:flex; gap:10px; margin-bottom:20px; }

.tab-btn{ flex:1; padding:10px; border:none; background:#111c29; color:#888; cursor:pointer; border-radius:5px; }

.tab-btn.active{ background:#00d4ff; color:#000; }

.page{ display:none; }

.page.active{ display:block; }

input,button{ width:100%; padding:12px; margin-top:10px; border:none; border-radius:5px; }

input{ background:#07111a; color:white; }

.main-btn{ background:#00d4ff; color:black; font-weight:bold; cursor:pointer; }

.alarm-item{ background:#07111a; padding:12px; border-radius:5px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; }

.delete-btn{ background:red; color:white; width:auto; padding:8px 12px; }

.timer-display, .stopwatch-display{ text-align:center; font-size:45px; color:#00ff9d; margin:20px 0; } </style>

</head>
<body><div class="container"><h1>NEO ALARM CLOCK</h1><div id="clock">00:00:00</div>
<div id="date">Loading...</div><div class="tabs">
  <button class="tab-btn active" onclick="showPage('alarm',this)">Alarm</button>
  <button class="tab-btn" onclick="showPage('timer',this)">Timer</button>
  <button class="tab-btn" onclick="showPage('stopwatch',this)">Watch</button>
</div><div class="page active" id="page-alarm">
  <input type="time" id="alarmTime">
  <button class="main-btn" onclick="addAlarm()">Set Alarm</button>  <div id="alarmList"></div>
</div><div class="page" id="page-timer">
  <input type="number" id="timerMinutes" placeholder="Minutes">  <div class="timer-display" id="timerDisplay">00:00</div><button class="main-btn" onclick="startTimer()">Start Timer</button>

</div><div class="page" id="page-stopwatch">  <div class="stopwatch-display" id="stopwatchDisplay">00:00:00</div><button class="main-btn" onclick="toggleStopwatch()">Start / Stop</button>

</div></div><script>
function updateClock(){
  const now = new Date();

  document.getElementById('clock').innerText =
    now.toLocaleTimeString();

  document.getElementById('date').innerText =
    now.toDateString();
}

setInterval(updateClock,1000);
updateClock();

function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById('page-'+page)
    .classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(t=>{
    t.classList.remove('active');
  });

  btn.classList.add('active');
}

let alarms = [];

function addAlarm(){
  const time = document.getElementById('alarmTime').value;

  if(!time){
    alert('Select alarm time');
    return;
  }

  alarms.push(time);
  renderAlarms();
}

function renderAlarms(){
  const list = document.getElementById('alarmList');

  list.innerHTML = '';

  alarms.forEach((alarm,index)=>{
    const div = document.createElement('div');

    div.className = 'alarm-item';

    div.innerHTML = `
      <span>${alarm}</span>
      <button class="delete-btn" onclick="deleteAlarm(${index})">Delete</button>
    `;

    list.appendChild(div);
  });
}

function deleteAlarm(index){
  alarms.splice(index,1);
  renderAlarms();
}

setInterval(()=>{
  const now = new Date();

  const current = now.toTimeString().slice(0,5);

  alarms.forEach(alarm=>{
    if(alarm === current){
      alert('⏰ Alarm Ringing!');
    }
  });
},1000);

let timerInterval;

function startTimer(){
  let minutes = parseInt(document.getElementById('timerMinutes').value);

  if(isNaN(minutes) || minutes <= 0){
    alert('Enter valid minutes');
    return;
  }

  let seconds = minutes * 60;

  clearInterval(timerInterval);

  timerInterval = setInterval(()=>{

    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;

    document.getElementById('timerDisplay').innerText =
      `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

    seconds--;

    if(seconds < 0){
      clearInterval(timerInterval);
      alert('⏰ Timer Finished!');
    }

  },1000);
}

let stopwatchInterval;
let stopwatchRunning = false;
let stopwatchSeconds = 0;

function toggleStopwatch(){

  if(!stopwatchRunning){

    stopwatchRunning = true;

    stopwatchInterval = setInterval(()=>{

      stopwatchSeconds++;

      const hrs = Math.floor(stopwatchSeconds / 3600);
      const mins = Math.floor((stopwatchSeconds % 3600) / 60);
      const secs = stopwatchSeconds % 60;

      document.getElementById('stopwatchDisplay').innerText =
        `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

    },1000);

  }else{

    stopwatchRunning = false;
    clearInterval(stopwatchInterval);
  }
}
</script></body>
</html>
